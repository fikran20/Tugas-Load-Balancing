version: '3.8'

services:
  nginx-loadbalancer:
    image: nginx:alpine
    container_name: nginx-loadbalancer
    ports:
      - "8099:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web-node-a
      - web-node-b
      - web-node-c

  web-node-a:
    build: .
    container_name: web-node-a
    environment:
      - SERVER_NAME=SERVER 1

  web-node-b:
    build: .
    container_name: web-node-b
    environment:
      - SERVER_NAME=SERVER 2

  web-node-c:
    build: .
    container_name: web-node-c
    environment:
      - SERVER_NAME=SERVER 3